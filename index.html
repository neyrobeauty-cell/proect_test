<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Генератор идей постов</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(15, 23, 42, 0.72);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22d3ee;
      --border: rgba(148, 163, 184, 0.28);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(56, 189, 248, 0.18), transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(34, 211, 238, 0.14), transparent 40%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    .card {
      width: min(780px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      transform: translateY(12px);
      opacity: 0;
      animation: card-enter 0.75s ease forwards;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 2vw + 1rem, 2.3rem);
      line-height: 1.2;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 1rem;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }

    li {
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateX(-18px);
      opacity: 0;
      animation: item-in 0.55s ease forwards;
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    li::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 14px rgba(56, 189, 248, 0.7);
      flex-shrink: 0;
    }

    li:hover {
      transform: translateX(0) scale(1.01);
      border-color: rgba(56, 189, 248, 0.75);
      background: rgba(15, 23, 42, 0.86);
    }

    li:nth-child(1) { animation-delay: 0.2s; }
    li:nth-child(2) { animation-delay: 0.35s; }
    li:nth-child(3) { animation-delay: 0.5s; }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      color: #0f172a;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(0);
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
      min-height: 1.25rem;
    }

    @keyframes card-enter {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes item-in {
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      .card, li {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Генератор идей постов</h1>
    <p class="subtitle">Выбери формат и получи идеи для контента.</p>

    <ul id="ideas-list">
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сториз на сегодня</li>
      <li>Контент план на неделю</li>
    </ul>

    <div class="actions">
      <button type="button" id="shuffle-btn">Перемешать пункты</button>
      <button type="button" id="pulse-btn">Подсветить список</button>
    </div>
    <p class="hint" id="hint"></p>
  </main>

  <script>
    const list = document.getElementById("ideas-list");
    const hint = document.getElementById("hint");
    const shuffleBtn = document.getElementById("shuffle-btn");
    const pulseBtn = document.getElementById("pulse-btn");

    function showHint(text) {
      hint.textContent = text;
      hint.animate(
        [{ opacity: 0.2, transform: "translateY(4px)" }, { opacity: 1, transform: "translateY(0)" }],
        { duration: 260, easing: "ease-out" }
      );
    }

    shuffleBtn.addEventListener("click", () => {
      const items = Array.from(list.children);
      for (let i = items.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }

      items.forEach((item, index) => {
        list.appendChild(item);
        item.animate(
          [{ transform: "translateX(-10px)", opacity: 0.4 }, { transform: "translateX(0)", opacity: 1 }],
          { duration: 300 + index * 90, easing: "ease-out" }
        );
      });

      showHint("Список обновлен. Можно выбрать новый фокус на сегодня.");
    });

    pulseBtn.addEventListener("click", () => {
      list.animate(
        [
          { transform: "scale(1)" },
          { transform: "scale(1.015)" },
          { transform: "scale(1)" }
        ],
        { duration: 550, easing: "ease-in-out" }
      );
      showHint("Отлично! Сохрани импульс и начни с первого пункта.");
    });
  </script>
</body>
</html>
